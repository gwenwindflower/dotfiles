# ── Right section: machine info ───────────────────────────────────────────────
# Color Key
# CPU segment (low = surface2, high = maroon)
# RAM segment (low = green, high = peach)
# Battery segment (low = red, high = blue)
#
# Requires these plugins:
# set -g @plugin 'tmux-plugins/tmux-battery'
# set -g @plugin 'tmux-plugins/tmux-cpu'
#
# Useful and looks cool
# but it thrashed my CPU so /shrug

set -g status-right ""

# CPU / RAM formatting
set -g @cpu_percentage_format "%3.0f%%"
set -g @ram_percentage_format "%3.0f%%"

# Collapse tmux-cpu's 3 states into your 2-state logic
set -g @cpu_medium_thresh "70"
set -g @cpu_high_thresh "90"
set -g @ram_medium_thresh "70"
set -g @ram_high_thresh "90"

# CPU: healthy = lavender, busy = maroon
# fg helpers are used for separator color; body text stays crust
set -g @cpu_low_bg_color    "#[bg=#{@thm_lavender}]"
set -g @cpu_low_fg_color    "#[fg=#{@thm_lavender}]"
set -g @cpu_medium_bg_color "#[bg=#{@thm_blue}]"
set -g @cpu_medium_fg_color "#[fg=#{@thm_blue}]"
set -g @cpu_high_bg_color   "#[bg=#{@thm_maroon}]"
set -g @cpu_high_fg_color   "#[fg=#{@thm_maroon}]"
set -g @cpu_low_icon    ""
set -g @cpu_medium_icon ""
set -g @cpu_high_icon   ""
# RAM: healthy = green, busy = peach
set -g @ram_low_bg_color    "#[bg=#{@thm_sapphire}]"
set -g @ram_low_fg_color    "#[fg=#{@thm_sapphire}]"
set -g @ram_medium_bg_color "#[bg=#{@thm_sky}]"
set -g @ram_medium_fg_color "#[fg=#{@thm_sky}]"
set -g @ram_high_bg_color   "#[bg=#{@thm_peach}]"
set -g @ram_high_fg_color   "#[fg=#{@thm_peach}]"
set -g @ram_low_icon    ""
set -g @ram_medium_icon ""
set -g @ram_high_icon   ""

# tier1 [0-5], tier2 [5-20] = red
# tier3 [20-35), tier4 [35-50) = yellow
# tier 5 through tier8 [50-100] = blue
set -g @batt_color_charge_primary_tier1 "#{E:@thm_flamingo}"
set -g @batt_color_charge_primary_tier2 "#{E:@thm_flamingo}"
set -g @batt_color_charge_primary_tier3 "#{E:@thm_pink}"
set -g @batt_color_charge_primary_tier4 "#{E:@thm_pink}"
set -g @batt_color_charge_primary_tier5 "#{E:@thm_blue}"
set -g @batt_color_charge_primary_tier6 "#{E:@thm_blue}"
set -g @batt_color_charge_primary_tier7 "#{E:@thm_blue}"
set -g @batt_color_charge_primary_tier8 "#{E:@thm_blue}"
set -g @batt_color_charge_secondary_tier1 "#{E:@thm_crust}"
set -g @batt_color_charge_secondary_tier2 "#{E:@thm_crust}"
set -g @batt_color_charge_secondary_tier3 "#{E:@thm_crust}"
set -g @batt_color_charge_secondary_tier4 "#{E:@thm_crust}"
set -g @batt_color_charge_secondary_tier5 "#{E:@thm_crust}"
set -g @batt_color_charge_secondary_tier6 "#{E:@thm_crust}"
set -g @batt_color_charge_secondary_tier7 "#{E:@thm_crust}"
set -g @batt_color_charge_secondary_tier8 "#{E:@thm_crust}"
set -g @batt_icon_charge_tier1 "󱐋"
set -g @batt_icon_charge_tier2 "󱐋"
set -g @batt_icon_charge_tier3 "󱐋"
set -g @batt_icon_charge_tier4 "󱐋"
set -g @batt_icon_charge_tier5 "󱐋"
set -g @batt_icon_charge_tier6 "󱐋"
set -g @batt_icon_charge_tier7 "󱐋"
set -g @batt_icon_charge_tier8 "󱐋"

set -ga status-right "#{cpu_bg_color}#[fg=#{@thm_base},bold]"
set -ga status-right "#{cpu_bg_color}#[fg=#{@thm_crust},bold] #{cpu_icon}#{cpu_percentage} "
set -ga status-right "#{ram_bg_color}#{cpu_fg_color}"
set -ga status-right "#{ram_bg_color}#[fg=#{@thm_crust},bold] #{ram_icon}#{ram_percentage} "
set -ga status-right "#{battery_color_charge_bg}#{ram_fg_color}"
set -ga status-right "#{battery_color_charge_bg}#[fg=#{@thm_crust},bold] #{battery_icon_charge}#{battery_percentage} "
