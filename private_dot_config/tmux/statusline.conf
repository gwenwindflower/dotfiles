# ── General ─────────────────────────────────────────────
# Top status bar — base background for a seamless feel
set -g status-position top
set -g status-style "bg=#{@thm_base}"
set -g status-justify "absolute-centre"

# ── Left section: window/session info ────────────────────────────────────────────────
# Session name (highlights on prefix), separator, command, separator, path, zoom indicator
# Command display uses @hint_cmd (via tmux_hint) when set, else pane_current_command
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_base},bold] #S },#{#[bg=#{@thm_blue},fg=#{@thm_base},bold] #S }}"
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_lavender},bold]},#{#[bg=#{@thm_blue},fg=#{@thm_lavender},bold]}}"
set -ga status-left "#[bg=#{@thm_lavender},fg=#{@thm_crust}] #{?#{@hint_cmd},#{@hint_cmd},#{pane_current_command}} "
set -ga status-left "#[bg=#{@thm_lavender},fg=#{@thm_surface0},none]"
set -ga status-left "#[bg=#{@thm_surface0},fg=#{@thm_text},bold] #{=/-10/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#{?window_zoomed_flag,#{#[bg=#{@thm_surface0},fg=#{@thm_yellow},none]},#{#[bg=#{@thm_surface0},fg=#{@thm_base},none]}}"
set -ga status-left "#[bg=#{@thm_yellow},fg=#{@thm_base},bold]#{?window_zoomed_flag, zoom ,}"
set -ga status-left "#[bg=#{@thm_yellow},fg=#{@thm_base}]#{?window_zoomed_flag,,}"

# ── Right section: session count, avg load, time ───────────────────────────────────────────────
set -g status-right ""
# Session count
set -ga status-right "#[bg=#{@thm_lavender},fg=#{@thm_base},bold]"
set -ga status-right "#[bg=#{@thm_lavender},fg=#{@thm_crust},bold] #{server_sessions}  "
# Load average (1-min)
set -ga status-right "#[bg=#{@thm_sapphire},fg=#{@thm_lavender}]"
set -ga status-right "#[bg=#{@thm_sapphire},fg=#{@thm_crust},bold]#(uptime | awk '{print $(NF-2)}' | tr -d ',')  "
# Date / Time
set -ga status-right "#[bg=#{@thm_blue},fg=#{@thm_sapphire}]"
set -ga status-right "#[bg=#{@thm_blue},fg=#{@thm_crust},bold] %H:%M   "

# ── Center section: icon-based window names ──────────────────────────────────
# Icons are resolved by pane-icon.sh (POSIX sh case statement)
# This sets the options @assigned_icon (literal override) and @hint_cmd (command name override)
# via the `tmux_hint` functions in fish
## Don't override our custom settings
set -g automatic-rename off
set -g allow-rename off
## window status content logic
set -g window-status-format "#($HOME/.config/tmux/pane-icon.sh #{pane_current_command} #{?@hint_cmd,#{@hint_cmd},none} #{?@assigned_icon,#{@assigned_icon},none})"
set -g window-status-current-format "#($HOME/.config/tmux/pane-icon.sh #{pane_current_command} #{?@hint_cmd,#{@hint_cmd},none} #{?@assigned_icon,#{@assigned_icon},none})"
## window status colors
set -g window-status-style "bg=#{@thm_base},fg=#{@thm_overlay0}"
set -g window-status-last-style "bg=#{@thm_base},fg=#{@thm_rosewater}"
set -g window-status-current-style "bg=#{@thm_base},fg=#{@thm_peach}"
set -g window-status-activity-style "bg=#{@thm_base},fg=#{@thm_lavender}"
set -g window-status-bell-style "bg=#{@thm_base},fg=#{@thm_lavender},blink"

