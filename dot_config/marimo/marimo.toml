[experimental]

[keymap]
preset = "vim"

[keymap.overrides]

[snippets]
custom_paths = []
include_default_snippets = true

[diagnostics]
sql_linter = true

[formatting]
line_length = 79

[completion]
activate_on_typing = true
copilot = false
signature_hint_on_typing = false

[package_management]
manager = "uv"

[runtime]
auto_instantiate = true
on_cell_change = "autorun"
reactive_tests = true
watcher_on_save = "lazy"
std_stream_max_bytes = 1000000
default_sql_output = "auto"
default_csv_encoding = "utf-8"
auto_reload = "off"
output_max_bytes = 8000000

[server]
browser = "default"
follow_symlink = false

[language_servers.ty]
enabled = true

[language_servers.pylsp]
enable_pylint = false
enable_pyflakes = false
enabled = true
enable_mypy = true
enable_flake8 = false
enable_ruff = true
enable_pydocstyle = false

[save]
format_on_save = true
autosave = "after_delay"
autosave_delay = 1000

[mcp]
presets = []

[mcp.mcpServers]

[display]
cell_output = "below"
default_table_max_columns = 50
default_width = "medium"
theme = "system"
reference_highlighting = false
code_editor_font_size = 14
default_table_page_size = 10
dataframes = "rich"

[ai]
rules = ""
mode = "manual"

[ai.bedrock]

[ai.open_ai]

[ai.google]

[ai.anthropic]

[ai.custom_providers]

[ai.models]
displayed_models = []
custom_models = []
